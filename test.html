<!DOCTYPE html>
<html>
<head>
<title>Garud Spray Test</title>
</head>

<body>

<h2>Website Response Test</h2>
<button onclick="startTest()">Start Test</button>

<div id="log"></div>

<script>

function log(msg){
  document.getElementById("log").innerHTML += msg + "<br>";
}

function startTest(){

setInterval(()=>{

fetch("/")
.then(r=>{
log("Request success at " + new Date().toLocaleTimeString());
})
.catch(e=>{
log("Error: "+e);
});

},2000);   // every 2 seconds

}

</script>

</body>
</html>
